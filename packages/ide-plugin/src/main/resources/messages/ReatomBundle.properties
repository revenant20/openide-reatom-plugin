# User-facing strings of the Reatom Support plugin.
# Non-ASCII glyphs are written as \u escapes so the file stays ASCII-safe
# regardless of how the .properties reader decodes it.
# {N} are MessageFormat arguments; apostrophes are doubled per MessageFormat.

# Code Vision provider name (Settings | Editor | Inlay Hints | Code Vision)
codeVision.name=Reatom reactive graph

# Gutter icon tooltips: {0}=unit kind, {1}=unit name, {2}=count
gutter.tooltip.read=Reatom {0} ''{1}'' \u00B7 {2,choice,1#\u21911 reader|1<\u2191{2} readers}
gutter.tooltip.write=Reatom {0} ''{1}'' \u00B7 {2,choice,1#\u21931 writer|1<\u2193{2} writers}

# Gutter icon accessible names: {0}=unit kind, {1}=unit name
gutter.accessibleName.read=Readers of Reatom {0} ''{1}''
gutter.accessibleName.write=Writers of Reatom {0} ''{1}''

# Usage navigation popup titles: {0}=unit name
navigation.title.usages=Usages of ''{0}''
navigation.title.readers=Readers of ''{0}''
navigation.title.writers=Writers of ''{0}''

# Hint shown when a unit has no usages of the requested kind: {0}=unit name
navigation.empty.usages=''{0}'' has no usages
navigation.empty.readers=''{0}'' has no readers
navigation.empty.writers=''{0}'' has no writers
