# Gradle Build Cache -> https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching=true
# Kotlin daemon memory
kotlin.daemon.jvmargs=-Xmx2g

# IntelliJ Platform already bundles kotlin-stdlib; don't auto-add it from the
# Gradle Kotlin plugin, otherwise it ships a conflicting kotlin-stdlib jar.
# https://plugins.jetbrains.com/docs/intellij/using-kotlin.html
kotlin.stdlib.default.dependency=false
